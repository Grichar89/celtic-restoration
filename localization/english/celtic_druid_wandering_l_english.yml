l_english:
 celtic_druid_events.0002.t:0 "A Wandering Druid"
 celtic_druid_events.0002.desc:0 "A figure cloaked in the colors of the forest has arrived at my gates. They claim to be a Druid of the old ways, a master of medicine and the spiritual laws. They offer their services to my court, seeking only to ensure the protection of the land and its people."
 celtic_druid_events.0002.a:0 "Welcome them! We honor the old wisdom."
 celtic_druid_events.0002.b:0 "Stay with us and serve our dynasty forever."
 celtic_druid_events.0002.c:0 "We have no need for your counsel today."
